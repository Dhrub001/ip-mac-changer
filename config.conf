# ============================================
# IP & MAC Changer Configuration File
# Author: Dhrub Raj Giri
# ============================================

# Time interval between IP/MAC changes (in seconds)
CHANGE_INTERVAL=60

# Network interface to use (auto = automatic detection)
NETWORK_INTERFACE=auto

# Restore original MAC address on script exit
RESTORE_MAC=true

# Enable logging to /var/log/ip-mac-changer.log
ENABLE_LOGGING=true

# Tor configuration
TOR_SOCKS_PORT=9050
TOR_CONTROL_PORT=9051

# Note: After changing values, restart the service:
# sudo systemctl restart ip-mac-changer